<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRESDEN TACTICAL</title>
    <style>.hidden { display: none !important; }</style>
</head>
<body style="background:#000; color:#39FF14; font-family:monospace; margin:0; padding:0; display:flex; flex-direction:column; height:100vh;">

    <div id="loginScreen" class="screen-container" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%;">
        <h2 style="color:#FFD60A; letter-spacing: 3px; text-shadow: 0 0 10px #FFD60A; margin-bottom: 30px;">DRESDEN OS</h2>
        <div style="width: 80%; max-width: 350px; display: flex; flex-direction: column; gap: 15px;">
            <input type="password" id="passInput" class="tactical-input" placeholder="Passcode" style="letter-spacing: 5px; font-size: 24px;">
            <button id="startBtn" class="tactical-btn primary-btn">START</button>
        </div>
    </div>

    <div id="mainApp" class="hidden screen-container" style="flex-direction:column; height:100%;">
        <div class="top-bar">
            <span>ID: <b id="myNum" style="font-size: 16px;">...</b> [<span id="userCount" style="color:#00BFFF;">0</span> 🌍]</span>
            <span id="status" style="color:#FFD60A; font-weight: bold;">READY</span>
        </div>
        
        <div id="dialerUI" class="dialer-container">
            <div class="tactical-panel">
                <div class="input-wrapper">
                    <label id="lblTarget" class="tactical-label">🎯 ІДЕНТИФІКАТОР ЦІЛІ</label>
                    <input type="number" id="targetNum" class="tactical-input target-input" placeholder="XXXXXX">
                </div>
                <div class="input-wrapper" style="margin-top: 20px;">
                    <label id="lblMsg" class="tactical-label sms-label">✉️ ПАКЕТ ДАНИХ (SMS)</label>
                    <input type="text" id="preCallMsg" class="tactical-input sms-input" placeholder="...">
                </div>
            </div>
            
            <div class="action-grid" style="margin-top: 25px;">
                <button id="callBtn" class="tactical-btn primary-btn huge-btn">ДЗВІНОК</button>
                <button id="smsBtn" class="tactical-btn secondary-btn huge-btn">ВІДПРАВИТИ SMS</button>
            </div>
            
            <div class="action-grid" style="margin-top: 15px;">
                <button id="videoModeBtn" class="tactical-btn toggle-btn">📞 AUDIO ONLY</button>
                <button id="relayToggle" class="tactical-btn toggle-btn">🛰 STEALTH: OFF</button>
            </div>
            
            <button id="readSmsBtn" class="hidden tactical-btn warning-btn" style="margin-top: 25px; width: 100%;">✉️ INBOX</button>
        </div>

        <div id="incomingUI" class="hidden" style="flex-direction:column; align-items:center; justify-content:center; position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.95); z-index:200;">
            <h2 style="color:#FFD60A; letter-spacing: 2px;">INCOMING LINK</h2>
            <h1 id="callerId" style="color:#39FF14; font-size: 40px; text-shadow: 0 0 20px #39FF14;"></h1>
            <p id="incomingPaging" style="color:#FFD60A; text-align:center; padding:10px; font-size: 16px;"></p>
            <div style="display:flex; gap:20px; margin-top:30px;">
                <button id="acceptBtn" class="tactical-btn primary-btn" style="padding: 20px 40px;">ACCEPT</button>
                <button id="declineBtn" class="tactical-btn danger-btn" style="padding: 20px 40px;">DECLINE</button>
            </div>
        </div>

        <div id="smsOverlay" class="hidden" style="position:absolute; top:10%; left:5%; right:5%; background:#050505; border:2px solid #00BFFF; box-shadow: 0 0 30px rgba(0,191,255,0.3); padding:20px; z-index:300; border-radius: 8px;">
            <pre id="smsContent" style="white-space:pre-wrap; word-wrap:break-word; color:#00BFFF; font-size: 16px;"></pre>
            <button id="burnSmsBtn" class="tactical-btn danger-btn" style="width:100%; margin-top:20px;">BURN SMS</button>
        </div>

        <div id="activeCallUI" class="hidden">
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay playsinline muted></video>
            <audio id="audio" autoplay></audio>
            
            <div id="fileProgress" class="hidden" style="width:100%; padding:5px; background:#111; font-size:10px;">
                <span id="progText">TRANSFER</span>: <span id="filePercent">0%</span>
                <div style="width:100%; height:5px; background:#333; margin-top:3px;"><div id="progBar" style="width:0%; height:100%; background:#39FF14;"></div></div>
            </div>

            <div id="chatMessages"></div>

            <div class="chat-input" style="display:flex;">
                <input type="text" id="msgInput" placeholder="Message..." style="flex:1; background:#111; color:#39FF14; border:1px solid #333; padding:10px; font-family: monospace;">
                <button id="sendBtn" style="background:#111; color:#39FF14; border:1px solid #333; padding:10px 20px; font-weight: bold;">SEND</button>
            </div>

            <div class="call-controls">
                <button id="muteBtn" class="btn-sub" style="color:#39FF14;">🎤 ON</button>
                <button id="scrambleBtn" class="btn-sub" style="color:#39FF14;">🎭 NORMAL</button>
                <button id="geoBtn" class="btn-sub" style="color:#FFD60A;">GEO</button>
                <button id="photoBtn" class="btn-sub" style="color:#00BFFF;">FILE</button>
                <button id="burnBtn" class="btn-sub" style="color:red; border-color:red;">BURN</button>
                <button id="hangBtn" class="btn-sub" style="color:red; border-color:red; flex-basis:100%; font-size: 14px !important;">HANG UP <span id="callTimer">00:00</span></button>
            </div>
            <input type="file" id="fileInp" style="display:none;">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
