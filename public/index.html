<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>DRESDEN TACTICAL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanlines"></div>

    <div class="app-container">
        <div id="loginScreen" class="screen-container login-screen">
            <h2 class="glitch-title">DRESDEN OS</h2>
            <div class="tactical-panel login-panel">
                <input type="password" id="passInput" class="tactical-input center-input" placeholder="Пароль доступу">
                <button id="startBtn" class="tactical-btn primary-btn full-width">УВІЙТИ</button>
            </div>
        </div>

        <div id="mainApp" class="hidden main-app-layout">
            
            <div class="top-bar" id="topBarContainer">
                <div class="status-area">
                    <span style="color:#39FF14;">ID: <strong id="myNum">---</strong></span>
                    <span style="color:#00BFFF; margin: 0 4px;">[<span id="userCount">0</span> 🌍]</span>
                    <span id="status" style="color:#39FF14; font-weight:bold; margin-left:6px; text-transform:uppercase;">ГОТОВО</span>
                </div>
                <div id="topButtons" style="display:flex; gap:5px; align-items:center;"></div>
            </div>

            <div id="dialerUI" class="dialer-container">
                <div class="tactical-panel">
                    <input type="tel" id="targetNum" class="tactical-input target-input" placeholder="Номер абонента" autocomplete="off">
                    <input type="text" id="preCallMsg" class="tactical-input sms-input" placeholder="Текст SMS (Офлайн)...">
                    
                    <div class="action-grid" style="margin-top: 15px;">
                        <button id="callBtn" class="tactical-btn primary-btn">ДЗВІНОК</button>
                        <button id="smsBtn" class="tactical-btn secondary-btn">ВІДПРАВИТИ SMS</button>
                        <button id="videoModeBtn" class="tactical-btn toggle-btn mode-btn">📞 ТІЛЬКИ АУДІО</button>
                        <button id="relayToggle" class="tactical-btn toggle-btn stealth-btn">🛰 СТЕЛС: ВИМК</button>
                    </div>
                    
                    <button id="readSmsBtn" class="tactical-btn read-sms-btn hidden" style="margin-top: 15px;">✉️ ВХІДНІ</button>
                </div>
            </div>

            <div id="activeCallUI" class="hidden active-call-layout">
                <div class="video-container">
                    <video id="remoteVideo" autoplay playsinline class="hidden"></video>
                    <video id="localVideo" autoplay playsinline muted class="hidden"></video>
                    <audio id="audio" autoplay playsinline></audio>
                </div>
                
                <div class="call-info-bar">
                    <span class="link-label">LINK: <strong id="remoteIdDisplay" class="link-value"></strong></span>
                    <span id="callTimer" class="timer-text">00:00</span>
                </div>

                <div id="fileProgress" class="hidden progress-container">
                    <div class="progress-header">
                        <span id="progText">ПЕРЕДАЧА</span> <span id="filePercent">0%</span>
                    </div>
                    <div class="progress-track"><div id="progBar" class="progress-fill"></div></div>
                </div>

                <div id="chatMessages" class="chat-box"></div>

                <div class="chat-input-area">
                    <input type="text" id="msgInput" placeholder="Повідомлення..." class="tactical-input msg-input-field">
                    <button id="sendBtn" class="tactical-btn primary-btn send-msg-btn">НАДІСЛАТИ</button>
                </div>

                <div class="call-controls">
                    <button id="muteBtn" class="btn-sub">🎤 УВІМК</button>
                    <button id="scrambleBtn" class="btn-sub">🎭 НОРМАЛЬНИЙ</button>
                    <button id="geoBtn" class="btn-sub geo-btn-style">ГЕО</button>
                    <button id="photoBtn" class="btn-sub photo-btn-style">ФОТО</button>
                    <button id="burnBtn" class="btn-sub burn-btn-style">ЗНИЩИТИ</button>
                    <button id="hangBtn" class="btn-sub hang-btn-style">ЗАВЕРШИТИ</button>
                </div>
                <input type="file" id="fileInp" class="hidden">
            </div>
            
            <div id="incomingUI" class="hidden incoming-overlay">
                <div class="tactical-panel incoming-panel">
                    <h2 class="incoming-title">ВХІДНИЙ ЗВ'ЯЗОК</h2>
                    <div id="callerId" class="caller-id-display">---</div>
                    <div id="incomingPaging" class="incoming-paging-text"></div>
                    
                    <div class="action-grid">
                        <button id="declineBtn" class="tactical-btn danger-btn">ВІДХИЛИТИ</button>
                        <button id="acceptBtn" class="tactical-btn primary-btn">ПРИЙНЯТИ</button>
                    </div>
                </div>
            </div>
            
            <div id="smsOverlay" class="hidden sms-overlay-box">
                <div class="sms-header">
                    <h3 class="sms-overlay-title">ОТРИМАНО ПАКЕТ</h3>
                </div>
                <div id="smsContent" class="sms-content-box"></div>
                <button id="burnSmsBtn" class="tactical-btn danger-btn full-width">ЗНИЩИТИ SMS</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
